name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Noto Sans TC font
        uses: actions/cache@v4
        with:
          path: .cache
          key: noto-sans-tc-medium

      - name: Build SPA (vite)
        run: npx vite build

      # Cache the 1,032 OG PNGs + share HTMLs. They only depend on the data
      # JSON + palette + generator script — most pushes (SPA / style edits)
      # are cache hits, saving ~5 minutes of regeneration.
      - name: Cache share pages + OG PNGs
        id: share-cache
        uses: actions/cache@v4
        with:
          path: |
            dist/og
            dist/share
          key: share-${{ hashFiles('data/processed/*-2022-villages.json', 'src/palette.js', 'scripts/build-share.mjs') }}

      - name: Build share pages
        if: steps.share-cache.outputs.cache-hit != 'true'
        run: npm run build:share
        env:
          SITE_BASE: https://ileivoivm.github.io/change

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
